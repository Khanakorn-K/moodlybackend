name: Moodly CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  build-image:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set IMAGE name lowercase
        run: echo "IMAGE=${REGISTRY}/${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Build & Push Docker Image
        run: |
          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:${{ github.sha }} \
            -f Docker/dockerfile .

          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_ACTOR,GITHUB_TOKEN,DATABASE_URL,JWT_SECRET,POSTGRES_PASSWORD,REDIS_PASSWORD
          script: |
            set -e

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            if [ ! -d ~/moodly ]; then
              git clone https://github.com/Khanakorn-K/moodlybackend.git ~/moodly
            fi

            cd ~/moodly
            git pull --rebase origin main

            cd ~/moodly/Docker

            cat <<EOF > .env
            IMAGE_TAG=$IMAGE_TAG
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            REDIS_PASSWORD=$REDIS_PASSWORD
            EOF

            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

  migrate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Run Database Migration on Lightsail
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: DATABASE_URL
          script: |
            set -e
            cd ~/moodly
            DB_NETWORK=$(docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' moodlydb)
            docker run --rm --network $DB_NETWORK -v ~/moodly:/app -w /app -e DATABASE_URL=$DATABASE_URL golang:1.26 go run config/migrate/migrate.go
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  swaggerinit:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger Docs
        run: swag init -g cmd/main.go --parseDependency --parseInternal

      - name: Auto Commit Swagger Docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate swagger docs"
          file_pattern: docs/*
